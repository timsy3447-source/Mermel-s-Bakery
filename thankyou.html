<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Mermel's Bakery</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #fff8fa 0%, #ffe0f7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: 'Segoe UI', 'Arial', sans-serif;
    }
    .thankyou-card {
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      box-shadow: 0 8px 32px #fc575e33, 0 2px 8px #ff996633;
      padding: 48px 32px 40px;
      max-width: 420px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 4px solid #fc575e44;
      animation: popIn 0.7s cubic-bezier(.4,2,.2,1);
    }
    .thankyou-card h1 {
      color: #fc575e;
      font-size: 2.5rem;
      margin-bottom: 18px;
      letter-spacing: 1px;
      text-shadow: 0 2px 12px #fc575e33;
    }
    .thankyou-card p {
      color: #8e3e3e;
      font-size: 1.25rem;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .thankyou-card .cake-emoji {
      font-size: 3.5rem;
      margin-bottom: 18px;
      display: block;
      animation: bounce 1.2s infinite alternate;
    }
    .thankyou-card .back-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 32px;
      font-size: 1.1rem;
      font-weight: bold;
      background: linear-gradient(90deg, #ff5e62 0%, #ff9966 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      box-shadow: 0 2px 8px #fc575e33;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.2s;
    }
    .thankyou-card .back-btn:hover {
      background: linear-gradient(90deg, #fc575e 0%, #ff9966 100%);
      transform: scale(1.05);
    }
    @keyframes popIn {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-18px); }
    }
  </style>
</head>
<body>
  <div class="thankyou-card">
    <span class="cake-emoji">🎂</span>
    <h1>Thank You!</h1>
    <p>We will contact you on how to pay.<br>Thank you for choosing us.<br><span style="color:#fc575e;font-weight:bold;">Your order is received!</span></p>
    <a href="index2.html" class="back-btn">Back to Home</a>
  </div>
</body>
</html>
